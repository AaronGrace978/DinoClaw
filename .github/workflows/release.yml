name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build
      - run: npx electron-builder --linux

      - uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: release/*

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build
      - run: npx electron-builder --win

      - uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: release/*

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build
      - run: npx electron-builder --mac

      - uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: release/*

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge artifacts
        run: |
          mkdir -p release
          cp artifacts/release-linux/* release/ 2>/dev/null || true
          cp artifacts/release-windows/* release/ 2>/dev/null || true
          cp artifacts/release-macos/* release/ 2>/dev/null || true
          ls -la release/

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
